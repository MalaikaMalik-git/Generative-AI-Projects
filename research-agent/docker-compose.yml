version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: research-agent-api:latest
    container_name: research-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist cost log outside the container
      - ./cost_log.jsonl:/app/cost_log.jsonl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s